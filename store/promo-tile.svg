<svg width="440" height="280" viewBox="0 0 440 280" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Very subtle gradient background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="440" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F0F7FF"/>
      <stop offset="100%" stop-color="#E8F0FE"/>
    </linearGradient>
    <!-- Soft blue glow behind icon -->
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bgGrad)"/>

  <!-- Decorative soft circles -->
  <circle cx="0"   cy="0"   r="160" fill="#3B82F6" opacity="0.04"/>
  <circle cx="440" cy="280" r="180" fill="#3B82F6" opacity="0.05"/>

  <!-- ── Icon area (left, scaled 1.28× so 128→164px, centred vertically) ── -->
  <rect x="12" y="58" width="164" height="164" rx="28" fill="url(#iconGlow)"/>

  <g transform="translate(12,58) scale(1.28125)">
    <g transform="translate(64 64) scale(1.42) translate(-64 -64)">
      <path d="M30 48c0-4.4 3.6-8 8-8h18l6 7h28c4.4 0 8 3.6 8 8v31c0 4.4-3.6 8-8 8H38c-4.4 0-8-3.6-8-8V48z"
            fill="#BFDBFE"/>
      <path d="M22 42c0-4.4 3.6-8 8-8h20l6 7h32c4.4 0 8 3.6 8 8v33c0 4.4-3.6 8-8 8H30c-4.4 0-8-3.6-8-8V42z"
            fill="#3B82F6"/>
      <path d="M32 58h52" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.26"/>
      <path d="M32 70h34" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.18"/>

      <circle cx="80" cy="48" r="19" fill="#EF4444"/>
      <path d="M72.5 40.5 L87.5 55.5 M87.5 40.5 L72.5 55.5" stroke="#FFFFFF" stroke-width="4.2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Vertical divider -->
  <line x1="200" y1="48" x2="200" y2="232" stroke="#DBEAFE" stroke-width="1.5"/>

  <!-- ── Text (right) ──────────────────────────────────────────────── -->

  <!-- App name -->
  <text x="220" y="118"
    fill="#1E3A8A"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-size="21" font-weight="700" letter-spacing="-0.4">Duplicate Tabs Killer</text>

  <!-- Tagline -->
  <text x="220" y="142"
    fill="#2563EB"
    font-family="PingFang SC, Noto Sans CJK SC, Helvetica Neue, Arial, sans-serif"
    font-size="13">自动检测并关闭重复标签页</text>

  <!-- Divider under tagline -->
  <line x1="220" y1="156" x2="418" y2="156" stroke="#DBEAFE" stroke-width="1"/>

  <!-- Feature list -->
  <circle cx="229" cy="175" r="3.5" fill="#3B82F6" opacity="0.75"/>
  <text x="241" y="180"
    fill="#475569"
    font-family="PingFang SC, Noto Sans CJK SC, Helvetica Neue, Arial, sans-serif"
    font-size="12.5">智能识别并自动关闭重复标签</text>

  <circle cx="229" cy="200" r="3.5" fill="#3B82F6" opacity="0.75"/>
  <text x="241" y="205"
    fill="#475569"
    font-family="PingFang SC, Noto Sans CJK SC, Helvetica Neue, Arial, sans-serif"
    font-size="12.5">支持标签分组与归档管理</text>

  <circle cx="229" cy="225" r="3.5" fill="#3B82F6" opacity="0.75"/>
  <text x="241" y="230"
    fill="#475569"
    font-family="PingFang SC, Noto Sans CJK SC, Helvetica Neue, Arial, sans-serif"
    font-size="12.5">轻量运行，不影响浏览器性能</text>

</svg>